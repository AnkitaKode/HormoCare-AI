<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Reviews - HormoCare AI</title>
    <link rel="stylesheet" href="styles/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .stats-banner {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }
        .stat-card {
            background: white;
            border-radius: var(--radius);
            padding: 2rem 1.5rem;
            text-align: center;
            box-shadow: var(--shadow-sm);
            border-top: 4px solid var(--primary);
        }
        .stat-card .stat-icon {
            font-size: 2.5rem;
            margin-bottom: 0.8rem;
        }
        .stat-card .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--primary);
            display: block;
            margin-bottom: 0.3rem;
        }
        .stat-card .stat-label {
            font-size: 0.95rem;
            color: var(--text-light);
        }
        .rating-summary {
            background: white;
            border-radius: var(--radius);
            padding: 2rem;
            box-shadow: var(--shadow-sm);
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 3rem;
            flex-wrap: wrap;
        }
        .overall-rating {
            text-align: center;
            min-width: 180px;
        }
        .overall-rating .rating-number {
            font-size: 3.5rem;
            font-weight: 700;
            color: var(--primary);
        }
        .overall-rating .stars {
            font-size: 1.5rem;
            color: #FFD700;
            margin-bottom: 0.5rem;
        }
        .overall-rating .review-count {
            color: var(--text-light);
            font-size: 0.9rem;
        }
        .rating-bars {
            flex: 1;
        }
        .rating-bar-row {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin-bottom: 0.5rem;
        }
        .rating-bar-label {
            font-size: 0.9rem;
            color: var(--text-dark);
            min-width: 50px;
        }
        .rating-bar-bg {
            flex: 1;
            height: 8px;
            background: #E8E8E8;
            border-radius: 4px;
            overflow: hidden;
        }
        .rating-bar-fill {
            height: 100%;
            background: var(--gradient);
            border-radius: 4px;
        }
        .rating-bar-count {
            font-size: 0.85rem;
            color: var(--text-light);
            min-width: 40px;
            text-align: right;
        }
        .write-review-section {
            background: white;
            border-radius: var(--radius);
            padding: 2rem;
            box-shadow: var(--shadow-sm);
            margin-bottom: 3rem;
        }
        .write-review-section h3 {
            color: var(--text-dark);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .write-review-section h3 i {
            color: var(--primary);
        }
        .star-input {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            justify-content: center;
        }
        .star-input i {
            font-size: 2rem;
            color: #DDD;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .star-input i:hover,
        .star-input i.active {
            color: #FFD700;
            transform: scale(1.1);
        }
        .reviews-list {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        .review-card {
            background: white;
            border: 2px solid #E8E8E8;
            border-radius: var(--radius);
            padding: 1.5rem;
            transition: all 0.3s ease;
        }
        .review-card:hover {
            box-shadow: var(--shadow-sm);
        }
        .review-header {
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        .reviewer-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 1.2rem;
        }
        .reviewer-info {
            flex: 1;
        }
        .reviewer-name {
            font-weight: 700;
            color: var(--text-dark);
            font-size: 1.05rem;
            margin-bottom: 0.2rem;
        }
        .review-meta {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 0.85rem;
            color: var(--text-light);
        }
        .review-stars {
            color: #FFD700;
            font-size: 0.9rem;
        }
        .review-text {
            color: var(--text-dark);
            line-height: 1.7;
            margin-bottom: 1rem;
        }
        .review-helpful {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            font-size: 0.9rem;
            padding-top: 1rem;
            border-top: 1px solid #F0F0F0;
        }
        .helpful-btn {
            background: none;
            border: 1px solid #E8E8E8;
            padding: 0.4rem 1rem;
            border-radius: 20px;
            cursor: pointer;
            color: var(--text-dark);
            font-weight: 500;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        .helpful-btn:hover {
            border-color: var(--success);
            color: var(--success);
        }
        .helpful-btn.active {
            background: var(--success);
            color: white;
            border-color: var(--success);
        }
        .verified-badge {
            background: rgba(46, 204, 113, 0.1);
            color: var(--success);
            padding: 0.2rem 0.6rem;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
        }
        @media (max-width: 768px) {
            .stats-banner {
                grid-template-columns: 1fr 1fr;
            }
            .rating-summary {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <i class="fas fa-heartbeat"></i>
                <span>HormoCare AI</span>
            </a>
            <div class="nav-menu">
                <a href="index.html" class="nav-link">Home</a>
                <a href="index.html#app" class="nav-link">Tracker</a>
                <a href="doctor-consultation.html" class="nav-link">Doctors</a>
                <a href="reviews.html" class="nav-link diet-link active"><i class="fas fa-star"></i> Reviews</a>
            </div>
            <button class="nav-toggle">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>

    <div class="page-container">
        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Home</a>

        <h2 class="section-title">Customer Reviews & Testimonials</h2>

        <!-- Stats Banner -->
        <div class="stats-banner">
            <div class="stat-card">
                <div class="stat-icon">👥</div>
                <span class="stat-value" id="totalUsers">12,458</span>
                <span class="stat-label">Active Users</span>
            </div>
            <div class="stat-card">
                <div class="stat-icon">⭐</div>
                <span class="stat-value">4.8</span>
                <span class="stat-label">Average Rating</span>
            </div>
            <div class="stat-card">
                <div class="stat-icon">💬</div>
                <span class="stat-value" id="totalReviews">1,847</span>
                <span class="stat-label">Total Reviews</span>
            </div>
            <div class="stat-card">
                <div class="stat-icon">✅</div>
                <span class="stat-value">94%</span>
                <span class="stat-label">Satisfaction Rate</span>
            </div>
        </div>

        <!-- Rating Summary -->
        <div class="rating-summary">
            <div class="overall-rating">
                <div class="rating-number">4.8</div>
                <div class="stars">⭐⭐⭐⭐⭐</div>
                <div class="review-count">Based on <span id="reviewCount">1,847</span> reviews</div>
            </div>
            <div class="rating-bars">
                <div class="rating-bar-row">
                    <span class="rating-bar-label">⭐⭐⭐⭐⭐</span>
                    <div class="rating-bar-bg"><div class="rating-bar-fill" style="width: 78%"></div></div>
                    <span class="rating-bar-count">1,441</span>
                </div>
                <div class="rating-bar-row">
                    <span class="rating-bar-label">⭐⭐⭐⭐</span>
                    <div class="rating-bar-bg"><div class="rating-bar-fill" style="width: 15%"></div></div>
                    <span class="rating-bar-count">277</span>
                </div>
                <div class="rating-bar-row">
                    <span class="rating-bar-label">⭐⭐⭐</span>
                    <div class="rating-bar-bg"><div class="rating-bar-fill" style="width: 4%"></div></div>
                    <span class="rating-bar-count">74</span>
                </div>
                <div class="rating-bar-row">
                    <span class="rating-bar-label">⭐⭐</span>
                    <div class="rating-bar-bg"><div class="rating-bar-fill" style="width: 2%"></div></div>
                    <span class="rating-bar-count">37</span>
                </div>
                <div class="rating-bar-row">
                    <span class="rating-bar-label">⭐</span>
                    <div class="rating-bar-bg"><div class="rating-bar-fill" style="width: 1%"></div></div>
                    <span class="rating-bar-count">18</span>
                </div>
            </div>
        </div>

        <!-- Write Review Section -->
        <div class="write-review-section">
            <h3><i class="fas fa-edit"></i> Write Your Review</h3>
            <form id="reviewForm">
                <div class="form-group">
                    <label>Your Rating</label>
                    <div class="star-input" id="starInput">
                        <i class="fas fa-star" data-rating="1"></i>
                        <i class="fas fa-star" data-rating="2"></i>
                        <i class="fas fa-star" data-rating="3"></i>
                        <i class="fas fa-star" data-rating="4"></i>
                        <i class="fas fa-star" data-rating="5"></i>
                    </div>
                </div>
                <div class="form-group">
                    <label>Your Name</label>
                    <input type="text" id="reviewerName" placeholder="Enter your name" required>
                </div>
                <div class="form-group">
                    <label>Your Review</label>
                    <textarea id="reviewText" rows="5" placeholder="Share your experience with HormoCare AI... How has it helped you?" required></textarea>
                </div>
                <div id="review-msg" class="form-message"></div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-paper-plane"></i> Submit Review
                    </button>
                </div>
            </form>
        </div>

        <!-- Reviews List -->
        <h3 style="text-align:center; color:var(--text-dark); margin-bottom:1.5rem;">What Our Users Say</h3>
        <div class="reviews-list" id="reviewsList"></div>
    </div>

    <script src="js/app.js"></script>
    <script>
        let userRating = 0;
        let userReviews = [];

        const sampleReviews = [
            {
                name: 'Ananya P.',
                rating: 5,
                date: '2026-03-15',
                text: 'This app has been life-changing! I was struggling with irregular periods for years and didn\'t realize I might have PCOS. The daily symptom tracking helped me identify patterns, and the AI analysis gave me the confidence to see a doctor. Now I\'m getting proper treatment. Thank you HormoCare AI!',
                helpful: 142,
                verified: true
            },
            {
                name: 'Priya S.',
                rating: 5,
                date: '2026-03-10',
                text: 'Amazing app for PCOS management! The personalized diet plan and exercise recommendations are spot-on. I\'ve lost 5kg in 2 months by following the low GI diet suggestions. The symptom tracker keeps me accountable and I can share the data with my doctor.',
                helpful: 98,
                verified: true
            },
            {
                name: 'Deepika M.',
                rating: 4,
                date: '2026-03-08',
                text: 'Really helpful for tracking symptoms and understanding PCOS risk factors. The AI risk assessment was accurate - it flagged my concerns and I got diagnosed with PCOS. Would love to see more features like community support groups.',
                helpful: 76,
                verified: true
            },
            {
                name: 'Riya K.',
                rating: 5,
                date: '2026-03-05',
                text: 'Best PCOS tracking app I\'ve tried! The interface is beautiful and easy to use. Love the daily reminders and the detailed analysis. The doctor consultation feature is super convenient too.',
                helpful: 65,
                verified: false
            },
            {
                name: 'Neha R.',
                rating: 5,
                date: '2026-02-28',
                text: 'This app gave me hope. I was feeling lost with all my symptoms - hair fall, acne, weight gain. The risk score helped me understand I need medical help. Booked a consultation through the app and now I\'m on the right treatment path.',
                helpful: 89,
                verified: true
            },
            {
                name: 'Shreya J.',
                rating: 4,
                date: '2026-02-25',
                text: 'Very comprehensive app with all features needed for PCOS management. The meal plan feature is fantastic - finally Indian food options that actually work! Diet tracker helps me stay on track.',
                helpful: 54,
                verified: true
            },
            {
                name: 'Meera D.',
                rating: 5,
                date: '2026-02-20',
                text: 'Can\'t recommend this enough! As someone newly diagnosed with PCOS, this app has been my guide. The personalized care plan based on my symptoms is incredibly helpful. The supplement suggestions match what my doctor recommended.',
                helpful: 103,
                verified: true
            },
            {
                name: 'Kavya B.',
                rating: 5,
                date: '2026-02-18',
                text: 'The symptom tracking is so detailed and intuitive. I love that I can track cycle, weight, mood, sleep all in one place. The AI analysis gives great insights. Shared my data with my gynecologist and she was impressed!',
                helpful: 71,
                verified: true
            }
        ];

        document.addEventListener('DOMContentLoaded', function () {
            const navToggle = document.querySelector('.nav-toggle');
            const navMenu = document.querySelector('.nav-menu');
            if (navToggle && navMenu) {
                navToggle.addEventListener('click', () => navMenu.classList.toggle('active'));
            }

            loadUserReviews();
            renderReviews();
            updateStats();

            document.querySelectorAll('#starInput i').forEach(star => {
                star.addEventListener('click', function () {
                    userRating = parseInt(this.dataset.rating);
                    document.querySelectorAll('#starInput i').forEach((s, i) => {
                        s.classList.toggle('active', i < userRating);
                    });
                });
                star.addEventListener('mouseenter', function () {
                    const rating = parseInt(this.dataset.rating);
                    document.querySelectorAll('#starInput i').forEach((s, i) => {
                        s.style.color = i < rating ? '#FFD700' : '#DDD';
                    });
                });
            });

            document.getElementById('starInput').addEventListener('mouseleave', function () {
                document.querySelectorAll('#starInput i').forEach((s, i) => {
                    s.style.color = i < userRating ? '#FFD700' : '#DDD';
                });
            });

            document.getElementById('reviewForm').addEventListener('submit', function (e) {
                e.preventDefault();
                submitReview();
            });
        });

        function submitReview() {
            const name = document.getElementById('reviewerName').value;
            const text = document.getElementById('reviewText').value;

            if (userRating === 0) {
                showMessage('Please select a star rating.', 'error');
                return;
            }

            if (!name || !text) {
                showMessage('Please fill in all fields.', 'error');
                return;
            }

            const review = {
                name,
                rating: userRating,
                text,
                date: new Date().toISOString().split('T')[0],
                helpful: 0,
                verified: false
            };

            userReviews.unshift(review);
            saveUserReviews();
            renderReviews();
            updateStats();

            document.getElementById('reviewerName').value = '';
            document.getElementById('reviewText').value = '';
            userRating = 0;
            document.querySelectorAll('#starInput i').forEach(s => s.classList.remove('active'));

            showMessage('Thank you for your review! It will be published after verification.', 'success');
        }

        function renderReviews() {
            const allReviews = [...userReviews, ...sampleReviews];
            document.getElementById('reviewsList').innerHTML = allReviews.map((review, idx) => `
                <div class="review-card">
                    <div class="review-header">
                        <div class="reviewer-avatar">${review.name.charAt(0)}</div>
                        <div class="reviewer-info">
                            <div class="reviewer-name">
                                ${review.name}
                                ${review.verified ? '<span class="verified-badge"><i class="fas fa-check-circle"></i> Verified User</span>' : ''}
                            </div>
                            <div class="review-meta">
                                <span class="review-stars">${'⭐'.repeat(review.rating)}</span>
                                <span>•</span>
                                <span>${formatDate(review.date)}</span>
                            </div>
                        </div>
                    </div>
                    <p class="review-text">${review.text}</p>
                    <div class="review-helpful">
                        <button class="helpful-btn" onclick="markHelpful(${idx})">
                            <i class="fas fa-thumbs-up"></i> Helpful (${review.helpful})
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function markHelpful(idx) {
            const allReviews = [...userReviews, ...sampleReviews];
            if (idx < userReviews.length) {
                userReviews[idx].helpful++;
                saveUserReviews();
            }
            renderReviews();
        }

        function updateStats() {
            const total = userReviews.length + sampleReviews.length;
            document.getElementById('totalReviews').textContent = total.toLocaleString();
            document.getElementById('reviewCount').textContent = total.toLocaleString();
            
            const baseUsers = 12458;
            const newUsers = Math.floor(Math.random() * 50);
            document.getElementById('totalUsers').textContent = (baseUsers + newUsers).toLocaleString();
        }

        function formatDate(dateStr) {
            const d = new Date(dateStr + 'T00:00:00');
            return d.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
        }

        function saveUserReviews() {
            localStorage.setItem('hormocare_reviews', JSON.stringify(userReviews));
        }

        function loadUserReviews() {
            try {
                const saved = localStorage.getItem('hormocare_reviews');
                if (saved) userReviews = JSON.parse(saved);
            } catch (e) {
                console.error('Error loading reviews:', e);
            }
        }

        function showMessage(text, type) {
            const el = document.getElementById('review-msg');
            if (el) {
                el.innerHTML = `<div class="msg msg-${type}"><i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i> ${text}</div>`;
                setTimeout(() => { el.innerHTML = ''; }, 4000);
            }
        }
    </script>
</body>
</html>
