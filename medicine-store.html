<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medicine & Supplements Store - HormoCare AI</title>
    <link rel="stylesheet" href="styles/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .filter-section {
            background: white;
            border-radius: var(--radius);
            padding: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: var(--shadow-sm);
        }
        .filter-tabs {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        .filter-tab {
            padding: 0.7rem 1.5rem;
            border: 2px solid #E8E8E8;
            background: white;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .filter-tab:hover {
            border-color: var(--primary);
        }
        .filter-tab.active {
            background: var(--gradient);
            color: white;
            border-color: transparent;
        }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .product-card {
            background: white;
            border: 2px solid #E8E8E8;
            border-radius: var(--radius);
            padding: 1.5rem;
            transition: all 0.3s ease;
            position: relative;
        }
        .product-card:hover {
            box-shadow: var(--shadow);
            transform: translateY(-3px);
        }
        .product-badge {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: var(--success);
            color: white;
            padding: 0.3rem 0.8rem;
            border-radius: 15px;
            font-size: 0.75rem;
            font-weight: 700;
        }
        .product-badge.doctor-rec {
            background: var(--primary);
        }
        .product-image {
            width: 100%;
            height: 180px;
            background: var(--bg-light);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        .product-name {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
        }
        .product-desc {
            font-size: 0.85rem;
            color: var(--text-light);
            line-height: 1.5;
            margin-bottom: 0.8rem;
            min-height: 60px;
        }
        .product-benefits {
            list-style: none;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            color: var(--text-dark);
        }
        .product-benefits li {
            padding: 0.2rem 0;
        }
        .product-benefits li::before {
            content: '✓';
            color: var(--success);
            font-weight: 700;
            margin-right: 0.4rem;
        }
        .product-rating {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.8rem;
        }
        .product-rating .stars {
            color: #FFD700;
            font-size: 0.85rem;
        }
        .product-rating .rating-text {
            font-size: 0.8rem;
            color: var(--text-light);
        }
        .product-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            padding-top: 1rem;
            border-top: 1px solid #F0F0F0;
        }
        .product-price {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
        }
        .product-price .original {
            font-size: 0.9rem;
            text-decoration: line-through;
            color: var(--text-light);
            margin-left: 0.3rem;
        }
        .add-to-cart-btn {
            padding: 0.7rem 1.2rem;
            background: var(--gradient);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        .add-to-cart-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-sm);
        }
        .cart-float {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--gradient);
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            box-shadow: var(--shadow-lg);
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 100;
        }
        .cart-float:hover {
            transform: scale(1.1);
        }
        .cart-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--danger);
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 700;
        }
        .cart-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .cart-modal.active {
            display: flex;
        }
        .cart-content {
            background: white;
            border-radius: var(--radius);
            padding: 2rem;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }
        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid #F0F0F0;
        }
        .cart-header h3 {
            color: var(--text-dark);
        }
        .close-cart {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-light);
        }
        .cart-items {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .cart-item {
            display: flex;
            gap: 1rem;
            padding: 1rem;
            background: var(--bg-light);
            border-radius: var(--radius-sm);
        }
        .cart-item-name {
            flex: 1;
            font-weight: 600;
            color: var(--text-dark);
        }
        .cart-item-qty {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .qty-btn {
            width: 28px;
            height: 28px;
            border: 1px solid #E8E8E8;
            background: white;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .cart-item-price {
            font-weight: 700;
            color: var(--primary);
        }
        .cart-total {
            background: var(--bg-light);
            padding: 1.5rem;
            border-radius: var(--radius-sm);
            margin-bottom: 1.5rem;
        }
        .cart-total-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
        }
        .cart-total-row.grand {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--primary);
            padding-top: 1rem;
            border-top: 2px solid #E8E8E8;
            margin-top: 0.5rem;
        }
        .delivery-badge {
            background: rgba(46, 204, 113, 0.1);
            color: var(--success);
            padding: 0.5rem 1rem;
            border-radius: var(--radius-sm);
            text-align: center;
            font-weight: 600;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        @media (max-width: 768px) {
            .products-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <i class="fas fa-heartbeat"></i>
                <span>HormoCare AI</span>
            </a>
            <div class="nav-menu">
                <a href="index.html" class="nav-link">Home</a>
                <a href="index.html#app" class="nav-link">Tracker</a>
                <a href="doctor-consultation.html" class="nav-link">Doctors</a>
                <a href="medicine-store.html" class="nav-link diet-link active"><i class="fas fa-capsules"></i> Store</a>
            </div>
            <button class="nav-toggle">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>

    <div class="page-container">
        <a href="index.html#app" class="back-link"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>

        <h2 class="section-title">PCOS Supplements & Medicine Store</h2>
        <p class="form-subtitle">Doctor-recommended supplements and medicines for PCOS management with home delivery</p>

        <div class="delivery-badge">
            <i class="fas fa-shipping-fast"></i> Free home delivery on orders above ₹999
        </div>

        <!-- Filter Tabs -->
        <div class="filter-section">
            <div class="filter-tabs">
                <button class="filter-tab active" data-filter="all">All Products</button>
                <button class="filter-tab" data-filter="doctor-rec">Doctor Recommended</button>
                <button class="filter-tab" data-filter="supplements">Supplements</button>
                <button class="filter-tab" data-filter="medicines">Medicines</button>
                <button class="filter-tab" data-filter="wellness">Wellness</button>
            </div>
        </div>

        <!-- Products Grid -->
        <div class="products-grid" id="productsGrid"></div>
    </div>

    <!-- Cart Float Button -->
    <div class="cart-float" id="cartFloat">
        <i class="fas fa-shopping-cart"></i>
        <span class="cart-count" id="cartCount">0</span>
    </div>

    <!-- Cart Modal -->
    <div class="cart-modal" id="cartModal">
        <div class="cart-content">
            <div class="cart-header">
                <h3><i class="fas fa-shopping-cart"></i> Your Cart</h3>
                <button class="close-cart" onclick="closeCart()"><i class="fas fa-times"></i></button>
            </div>
            <div class="cart-items" id="cartItems"></div>
            <div class="cart-total" id="cartTotal"></div>
            <button class="btn btn-primary" style="width:100%" onclick="checkout()">
                <i class="fas fa-check-circle"></i> Proceed to Checkout
            </button>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>

                originalPrice: 999,

                benefits: ['Complete nutrition', 'Energy boost', 'Hair & skin health', '60 tablets']
            },
            {
                id: 8,
                name: 'Fenugreek Extract',
                category: 'supplements',
                doctorRec: false,
                icon: '🌿',
                price: 449,
                originalPrice: 599,

                benefits: ['Hormone balance', 'Insulin regulation', 'Reduces inflammation', '60 capsules']
            },
            {

                category: 'wellness',
                doctorRec: true,

                price: 899,
                originalPrice: 1199,

                reviews: 421,
                desc: 'Advanced probiotic blend for gut health and hormone metabolism.',
                benefits: ['Gut health support', 'Hormone metabolism', 'Immunity boost', '30 capsules']
            },
            {
                id: 10,
                name: 'Cinnamon Capsules',
                category: 'supplements',
                doctorRec: false,
                icon: '🍂',
                price: 399,
                originalPrice: 549,
                rating: 4.6,
                reviews: 156,
                desc: 'Cinnamon extract to improve insulin sensitivity and regulate blood sugar.',
                benefits: ['Improves insulin sensitivity', 'Blood sugar control', 'Natural remedy', '60 capsules']
            },
            {
                id: 11,
                name: 'Evening Primrose Oil',
                category: 'supplements',
                doctorRec: false,
                icon: '🌸',
                price: 749,
                originalPrice: 999,
                rating: 4.7,
                reviews: 203,
                desc: 'Rich in GLA for hormone balance and reducing PMS symptoms.',
                benefits: ['Hormone balance', 'Reduces PMS', 'Skin health', '60 softgels']
            },
            {
                id: 12,
                name: 'N-Acetyl Cysteine (NAC)',
                category: 'supplements',
                doctorRec: true,
                icon: '💪',
                price: 1099,
                originalPrice: 1499,
                rating: 4.8,
                reviews: 289,
                desc: 'Powerful antioxidant that improves insulin sensitivity and ovulation in PCOS.',
                benefits: ['Improves ovulation', 'Antioxidant support', 'Insulin sensitivity', '60 capsules']
            }
        ];

        let cart = [];
        let currentFilter = 'all';

        document.addEventListener('DOMContentLoaded', function () {
            const navToggle = document.querySelector('.nav-toggle');
            const navMenu = document.querySelector('.nav-menu');
            if (navToggle && navMenu) {
                navToggle.addEventListener('click', () => navMenu.classList.toggle('active'));
            }

            loadCart();
            renderProducts();

            document.querySelectorAll('.filter-tab').forEach(tab => {
                tab.addEventListener('click', function () {
                    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                    currentFilter = this.dataset.filter;
                    renderProducts();
                });
            });

            document.getElementById('cartFloat').addEventListener('click', openCart);
        });

        function renderProducts() {
            let filtered = products;
            if (currentFilter === 'doctor-rec') filtered = products.filter(p => p.doctorRec);
            else if (currentFilter !== 'all') filtered = products.filter(p => p.category === currentFilter);

            document.getElementById('productsGrid').innerHTML = filtered.map(p => `
                <div class="product-card">
                    ${p.doctorRec ? '<span class="product-badge doctor-rec">Doctor Recommended</span>' : ''}
                    <div class="product-image">${p.icon}</div>
                    <div class="product-name">${p.name}</div>
                    <div class="product-desc">${p.desc}</div>
                    <ul class="product-benefits">
                        ${p.benefits.map(b => `<li>${b}</li>`).join('')}
                    </ul>
                    <div class="product-rating">
                        <span class="stars">${'⭐'.repeat(Math.floor(p.rating))}</span>
                        <span class="rating-text">${p.rating} (${p.reviews} reviews)</span>
                    </div>
                    <div class="product-footer">
                        <div class="product-price">
                            ₹${p.price}
                            ${p.originalPrice ? `<span class="original">₹${p.originalPrice}</span>` : ''}
                        </div>
                        <button class="add-to-cart-btn" onclick="addToCart(${p.id})">
                            <i class="fas fa-cart-plus"></i> Add
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            const existing = cart.find(c => c.id === productId);
            if (existing) {
                existing.qty++;
            } else {
                cart.push({ ...product, qty: 1 });
            }
            saveCart();
            updateCartCount();
        }

        function removeFromCart(productId) {
            const existing = cart.find(c => c.id === productId);
            if (existing) {
                existing.qty--;
                if (existing.qty === 0) {
                    cart = cart.filter(c => c.id !== productId);
                }
            }
            saveCart();
            updateCartCount();
            renderCart();
        }

        function updateCartCount() {
            const count = cart.reduce((sum, item) => sum + item.qty, 0);
            document.getElementById('cartCount').textContent = count;
        }

        function openCart() {
            renderCart();
            document.getElementById('cartModal').classList.add('active');
        }

        function closeCart() {
            document.getElementById('cartModal').classList.remove('active');
        }

        function renderCart() {
            if (cart.length === 0) {
                document.getElementById('cartItems').innerHTML = '<p style="text-align:center; color:var(--text-light);">Your cart is empty</p>';
                document.getElementById('cartTotal').innerHTML = '';
                return;
            }

            document.getElementById('cartItems').innerHTML = cart.map(item => `
                <div class="cart-item">
                    <div class="cart-item-name">${item.name}</div>
                    <div class="cart-item-qty">
                        <button class="qty-btn" onclick="removeFromCart(${item.id})"><i class="fas fa-minus"></i></button>
                        <span>${item.qty}</span>
                        <button class="qty-btn" onclick="addToCart(${item.id})"><i class="fas fa-plus"></i></button>
                    </div>
                    <div class="cart-item-price">₹${item.price * item.qty}</div>
                </div>
            `).join('');

            const subtotal = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
            const delivery = subtotal >= 999 ? 0 : 49;
            const total = subtotal + delivery;

            document.getElementById('cartTotal').innerHTML = `
                <div class="cart-total-row"><span>Subtotal</span><span>₹${subtotal}</span></div>
                <div class="cart-total-row"><span>Delivery ${subtotal >= 999 ? '(Free)' : ''}</span><span>₹${delivery}</span></div>
                <div class="cart-total-row grand"><span>Total</span><span>₹${total}</span></div>
            `;
        }

        function checkout() {
            if (cart.length === 0) return;
            const order = {
                items: cart,
                total: cart.reduce((sum, item) => sum + (item.price * item.qty), 0),
                date: new Date().toISOString()
            };
            let orders = [];
            try { orders = JSON.parse(localStorage.getItem('hormocare_orders') || '[]'); } catch (e) {}
            orders.push(order);
            localStorage.setItem('hormocare_orders', JSON.stringify(orders));
            alert('Order placed successfully! You will receive a confirmation email with tracking details.');
            cart = [];
            saveCart();
            closeCart();
            updateCartCount();
        }

        function saveCart() {
            localStorage.setItem('hormocare_cart', JSON.stringify(cart));
        }

        function loadCart() {
            try {
                const saved = localStorage.getItem('hormocare_cart');
                if (saved) cart = JSON.parse(saved);
                updateCartCount();
            } catch (e) {
                console.error('Error loading cart:', e);
            }
        }
    </script>
</body>
</html>
